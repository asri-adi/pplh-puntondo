backend:
  name: github
  repo: asri-adi/pplh-puntondo
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "berita"
    label: "Berita & Artikel"
    label_singular: "Artikel"
    folder: "berita-posts"
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - {label: "Judul", name: "title", widget: "string"}
      - {label: "Tanggal", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false}
      - {label: "Kategori", name: "category", widget: "select", options: ["Berita","Kegiatan","Program","Komunitas","Konservasi","Pengumuman"], default: "Berita"}
      - {label: "Foto Utama", name: "featured_image", widget: "image", required: false}
      - {label: "Ringkasan", name: "excerpt", widget: "text", required: false}
      - {label: "Isi Artikel", name: "body", widget: "markdown"}

  - name: "pages"
    label: "Halaman"
    files:
      - label: "Kontak"
        name: "kontak"
        file: "data/kontak.yml"
        fields:
          - {label: "WhatsApp 1", name: "wa1", widget: "string"}
          - {label: "WhatsApp 2", name: "wa2", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
